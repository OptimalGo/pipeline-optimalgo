<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Projets — Optimal Go</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e14;
  --surface: #111820;
  --surface2: #1a2332;
  --border: #1e2d3d;
  --text: #e8edf5;
  --text-dim: #4a6080;
  --text-mid: #7a96b8;
  --accent: #00d4ff;
  --accent2: #00ff94;
  --warn: #ff9500;
  --danger: #ff4444;
  --pv: #378ADD;
  --pac: #1D9E75;
  --bat: #BA7517;
  --multi: #D4537E;
  --tf: #378ADD;
  --mf: #1D9E75;
  --su: #BA7517;
  --lc: #D4537E;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 2rem; }

/* Header */
header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 2.5rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 1rem;
}

.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.logo-text p { font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace; margin-top: 2px; }

.header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }

.last-update {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  display: flex; align-items: center; gap: 6px;
}
.pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent2);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}

.refresh-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-mid);
  padding: 6px 14px;
  border-radius: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 2rem;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent-color, var(--accent));
}
.stat-card:hover { border-color: var(--accent); }
.stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; font-family: 'DM Mono', monospace; }
.stat-val { font-size: 32px; font-weight: 800; margin: 4px 0 2px; line-height: 1; }
.stat-sub { font-size: 11px; color: var(--text-mid); }

/* Filters */
.filters-row {
  display: flex;
  gap: 8px;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
  align-items: center;
}
.filter-label { font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace; margin-right: 4px; }

.filter-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 12px;
  border-radius: 20px;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--text-mid); color: var(--text-mid); }
.filter-btn.active { border-color: var(--btn-color, var(--accent)); color: var(--btn-color, var(--accent)); background: rgba(0,212,255,0.06); }

/* Section title */
.section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Pipeline grid */
.pipeline-wrap { overflow-x: auto; margin-bottom: 2rem; }

.pipeline-grid {
  display: grid;
  grid-template-columns: 160px repeat(11, minmax(80px, 1fr));
  gap: 4px;
  min-width: 1100px;
}

.pipeline-header {
  display: contents;
}

.ph-empty { height: 48px; }
.ph-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 4px;
  text-align: center;
  font-size: 9px;
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  line-height: 1.3;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ph-cell.active-stage { border-color: var(--accent); color: var(--accent); }

.person-label {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding: 8px 4px;
  gap: 6px;
}

.person-header {
  display: flex;
  align-items: center;
  gap: 8px;
}

.avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  flex-shrink: 0;
}

.person-name { font-size: 12px; font-weight: 600; line-height: 1.2; }
.person-role { font-size: 9px; color: var(--text-dim); }

.load-bar-wrap { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 2px; }
.load-bar { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
.load-pct { font-size: 9px; color: var(--text-dim); font-family: 'DM Mono', monospace; }

.stage-cell {
  min-height: 52px;
  border-radius: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 3px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.project-chip {
  border-radius: 4px;
  padding: 4px 5px;
  font-size: 9px;
  font-weight: 600;
  cursor: pointer;
  line-height: 1.3;
  transition: all 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: 'DM Mono', monospace;
}
.project-chip:hover { transform: scale(1.02); opacity: 0.9; }

/* Detail panel */
.detail-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  margin-bottom: 2rem;
  display: none;
  animation: slideIn 0.2s ease;
}
.detail-panel.open { display: block; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

.detail-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
.detail-name { font-size: 20px; font-weight: 800; }
.detail-meta { font-size: 12px; color: var(--text-mid); margin-top: 4px; font-family: 'DM Mono', monospace; }

.close-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-mid); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.close-btn:hover { border-color: var(--danger); color: var(--danger); }

.stage-progress {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}
.stage-dot {
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 9px;
  font-family: 'DM Mono', monospace;
  border: 1px solid var(--border);
  color: var(--text-dim);
}
.stage-dot.done { background: var(--surface2); color: var(--text-mid); }
.stage-dot.current { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.1); }

.detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.detail-item label { font-size: 10px; color: var(--text-dim); font-family: 'DM Mono', monospace; text-transform: uppercase; display: block; margin-bottom: 3px; }
.detail-item span { font-size: 13px; font-weight: 600; }

/* People cards */
.people-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 12px;
  margin-bottom: 2rem;
}

.person-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  transition: border-color 0.2s;
}
.person-card:hover { border-color: var(--person-color); }

.person-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.person-card-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}

.person-card-name { font-size: 14px; font-weight: 700; }
.person-card-role { font-size: 10px; color: var(--text-dim); }

.person-load-bar {
  width: 100%; height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 4px;
}
.person-load-fill { height: 100%; border-radius: 2px; transition: width 0.6s; }
.person-load-label { font-size: 10px; color: var(--text-dim); font-family: 'DM Mono', monospace; margin-bottom: 10px; }

.person-projects { display: flex; flex-wrap: wrap; gap: 4px; }
.person-project-tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
  border: 1px solid var(--border);
  color: var(--text-mid);
}

/* Loading */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem;
  gap: 1rem;
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Legend */
.legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  margin-top: 1rem;
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-mid); }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; }

.error-msg {
  background: rgba(255,68,68,0.1);
  border: 1px solid rgba(255,68,68,0.3);
  border-radius: 8px;
  padding: 1rem 1.5rem;
  color: #ff8888;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
}
</style>
</head>
<body>
<div class="container">

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">
      <h1>Pipeline Projets</h1>
      <p>OPTIMAL GO — TABLEAU DE BORD TEMPS RÉEL</p>
    </div>
  </div>
  <div class="header-right">
    <div class="last-update">
      <div class="pulse"></div>
      <span id="last-update-text">Chargement...</span>
    </div>
    <button class="refresh-btn" onclick="loadData()">↻ Actualiser</button>
  </div>
</header>

<div id="stats-row" class="stats-row">
  <div class="loading"><div class="spinner"></div></div>
</div>

<div class="filters-row">
  <span class="filter-label">FILTRER :</span>
  <button class="filter-btn active" style="--btn-color:var(--accent)" onclick="filterBy('all',this)">Tous</button>
  <button class="filter-btn" style="--btn-color:var(--tf)" onclick="filterBy('tf',this)">Thomas</button>
  <button class="filter-btn" style="--btn-color:var(--mf)" onclick="filterBy('mf',this)">Marine</button>
  <button class="filter-btn" style="--btn-color:var(--su)" onclick="filterBy('su',this)">Sébastien</button>
  <button class="filter-btn" style="--btn-color:var(--lc)" onclick="filterBy('lc',this)">Laetitia</button>
  <button class="filter-btn" style="--btn-color:var(--pv)" onclick="filterBy('pv',this)">PV</button>
  <button class="filter-btn" style="--btn-color:var(--pac)" onclick="filterBy('pac',this)">PAC</button>
  <button class="filter-btn" style="--btn-color:var(--bat)" onclick="filterBy('bat',this)">Batterie</button>
</div>

<div class="section-title">Vue pipeline par étape</div>
<div class="pipeline-wrap">
  <div id="pipeline-grid" class="pipeline-grid">
    <div class="loading" style="grid-column:1/-1"><div class="spinner"></div><span>Connexion au Google Sheet...</span></div>
  </div>
</div>

<div id="detail-panel" class="detail-panel"></div>

<div class="section-title">Charge par collaborateur</div>
<div id="people-grid" class="people-grid"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--pv)"></div>PV</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--pac)"></div>PAC</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--bat)"></div>Batterie</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--multi)"></div>Multi</div>
  <div class="legend-item" style="margin-left:auto; font-size:10px; color:var(--text-dim); font-family:'DM Mono',monospace;">Bordure épaisse = Responsable · Bordure fine = Collaborateur</div>
</div>

</div>

<script>
const SHEET_ID = '18DN_xvYKcNV7FGQBb7mY99vgLLO2KI9DDYueQUZVeY0';
const SHEET_NAME = 'Projets';
const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

const STAGES = ['Prospection','Visite tech.','Étude','Offre envoyée','Offre acceptée','Dem. autor.','Autor. obtenues','Planifié','En cours','Mise en service','Clôture'];

const PEOPLE = [
  { id:'tf', name:'Thomas F.', initials:'TF', role:'CEO & Co-fondateur', color:'var(--tf)', hex:'#378ADD', light:'rgba(55,138,221,0.12)', dark:'#c8e0f8' },
  { id:'mf', name:'Marine F.', initials:'MF', role:'Tech. PV & Bat.', color:'var(--mf)', hex:'#1D9E75', light:'rgba(29,158,117,0.12)', dark:'#a8e8d0' },
  { id:'su', name:'Sébastien U.', initials:'SU', role:'Ingénieur PV', color:'var(--su)', hex:'#BA7517', light:'rgba(186,117,23,0.12)', dark:'#f0d090' },
  { id:'lc', name:'Laetitia C.', initials:'LC', role:'Admin. technico', color:'var(--lc)', hex:'#D4537E', light:'rgba(212,83,126,0.12)', dark:'#f0b0c8' },
];

const TYPE_COLORS = {
  'pv':    { bg:'rgba(55,138,221,0.15)',  text:'#c8e0f8', bar:'#378ADD' },
  'pac':   { bg:'rgba(29,158,117,0.15)', text:'#a8e8d0', bar:'#1D9E75' },
  'bat':   { bg:'rgba(186,117,23,0.15)', text:'#f0d090', bar:'#BA7517' },
  'multi': { bg:'rgba(212,83,126,0.15)', text:'#f0b0c8', bar:'#D4537E' },
};

function getTypeKey(typeStr) {
  if (!typeStr) return 'multi';
  const t = typeStr.toLowerCase();
  if (t.includes('+') || t.includes('multi')) return 'multi';
  if (t.includes('pac')) return 'pac';
  if (t.includes('bat')) return 'bat';
  if (t.includes('pv')) return 'pv';
  return 'multi';
}

function getPersonId(name) {
  if (!name) return null;
  const n = name.toLowerCase();
  if (n.includes('thomas') || n.includes('filipetto')) return 'tf';
  if (n.includes('marine') || n.includes('fauré') || n.includes('faure')) return 'mf';
  if (n.includes('sébastien') || n.includes('sebastien') || n.includes('unal')) return 'su';
  if (n.includes('laetitia') || n.includes('chiappini')) return 'lc';
  return null;
}

function getStageIndex(stageStr) {
  if (!stageStr) return 0;
  const m = stageStr.match(/^(\d+)/);
  if (m) return parseInt(m[1]) - 1;
  return 0;
}

let allProjects = [];
let activeFilter = 'all';

async function loadData() {
  document.getElementById('last-update-text').textContent = 'Actualisation...';
  try {
    const res = await fetch(API_URL + '&t=' + Date.now());
    const text = await res.text();
    const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?$/, ''));
    const rows = json.table.rows;

    allProjects = rows
      .filter(r => r.c && r.c[0] && r.c[0].v && r.c[0].v !== 'Centre analytique\n(CA)')
      .map((r, i) => {
        const get = (idx) => (r.c[idx] && r.c[idx].v) ? String(r.c[idx].v).trim() : '';
        const ca = get(0);
        const offre = get(1);
        const client = get(2);
        const type = get(3);
        const resp = get(4);
        const collab = get(5);
        const etape = get(6);
        const chemin = get(7);
        const dateOuv = get(8);
        const lastActivity = get(9);
        const notes = get(10);

        if (!ca || ca === '') return null;

        return {
          id: 'p' + i,
          ca, offre, client, type,
          resp: getPersonId(resp), respName: resp,
          collab: getPersonId(collab), collabName: collab,
          stage: getStageIndex(etape), etape,
          chemin, dateOuv, lastActivity, notes,
          typeKey: getTypeKey(type),
        };
      })
      .filter(Boolean)
      .filter(p => p.stage < 10); // exclure clôture

    document.getElementById('last-update-text').textContent = 'Mis à jour ' + new Date().toLocaleTimeString('fr-CH');
    render();
  } catch(e) {
    console.error(e);
    document.getElementById('stats-row').innerHTML = `<div class="error-msg">❌ Impossible de charger les données. Vérifiez que le Google Sheet est bien partagé en lecture publique.<br><small>${e.message}</small></div>`;
    document.getElementById('last-update-text').textContent = 'Erreur de chargement';
  }
}

function getVisible() {
  if (activeFilter === 'all') return allProjects;
  if (['tf','mf','su','lc'].includes(activeFilter))
    return allProjects.filter(p => p.resp === activeFilter || p.collab === activeFilter);
  return allProjects.filter(p => p.typeKey === activeFilter);
}

function filterBy(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const visible = getVisible();
  renderStats(visible);
  renderPipeline(visible);
  renderPeople(visible);
}

function renderStats(visible) {
  const active = visible.length;
  const chantier = visible.filter(p => p.stage >= 7 && p.stage <= 8).length;
  const offres = visible.filter(p => p.stage === 3).length;
  const autorisations = visible.filter(p => p.stage === 5 || p.stage === 6).length;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card" style="--accent-color:var(--accent)">
      <div class="stat-label">Projets actifs</div>
      <div class="stat-val" style="color:var(--accent)">${active}</div>
      <div class="stat-sub">en cours</div>
    </div>
    <div class="stat-card" style="--accent-color:var(--accent2)">
      <div class="stat-label">En chantier</div>
      <div class="stat-val" style="color:var(--accent2)">${chantier}</div>
      <div class="stat-sub">planifié ou en cours</div>
    </div>
    <div class="stat-card" style="--accent-color:var(--warn)">
      <div class="stat-label">Offres envoyées</div>
      <div class="stat-val" style="color:var(--warn)">${offres}</div>
      <div class="stat-sub">en attente réponse</div>
    </div>
    <div class="stat-card" style="--accent-color:var(--multi)">
      <div class="stat-label">Autorisations</div>
      <div class="stat-val" style="color:var(--multi)">${autorisations}</div>
      <div class="stat-sub">en cours</div>
    </div>
    <div class="stat-card" style="--accent-color:var(--text-mid)">
      <div class="stat-label">Collaborateurs</div>
      <div class="stat-val" style="color:var(--text-mid)">4</div>
      <div class="stat-sub">actifs</div>
    </div>
  `;
}

function renderPipeline(visible) {
  const grid = document.getElementById('pipeline-grid');
  grid.innerHTML = '';

  // Header row
  const emptyCell = document.createElement('div');
  emptyCell.className = 'ph-empty';
  grid.appendChild(emptyCell);

  STAGES.forEach((s, i) => {
    const cell = document.createElement('div');
    cell.className = 'ph-cell';
    cell.textContent = (i+1) + '. ' + s;
    grid.appendChild(cell);
  });

  // Person rows
  PEOPLE.forEach(person => {
    const myProjects = visible.filter(p => p.resp === person.id || p.collab === person.id);
    const activeCount = myProjects.length;
    const load = Math.min(100, Math.round((activeCount / 6) * 100));

    // Label cell
    const label = document.createElement('div');
    label.className = 'person-label';
    label.innerHTML = `
      <div class="person-header">
        <div class="avatar" style="background:${person.light};color:${person.dark}">${person.initials}</div>
        <div>
          <div class="person-name" style="color:${person.dark}">${person.name}</div>
          <div class="person-role">${person.role}</div>
        </div>
      </div>
      <div class="load-bar-wrap"><div class="load-bar" style="width:${load}%;background:${person.hex}"></div></div>
      <div class="load-pct">${load}% chargé · ${activeCount} proj.</div>
    `;
    grid.appendChild(label);

    // Stage cells
    for (let s = 0; s < 11; s++) {
      const cell = document.createElement('div');
      cell.className = 'stage-cell';
      const stageProjects = myProjects.filter(p => p.stage === s);

      stageProjects.forEach(p => {
        const c = TYPE_COLORS[p.typeKey];
        const isResp = p.resp === person.id;
        const chip = document.createElement('div');
        chip.className = 'project-chip';
        chip.title = p.ca + ' — ' + p.client;
        chip.style.background = c.bg;
        chip.style.color = c.text;
        chip.style.border = isResp ? `1.5px solid ${c.bar}` : `0.5px solid ${c.bar}40`;
        chip.textContent = p.ca;
        chip.onclick = () => showDetail(p);
        cell.appendChild(chip);
      });

      grid.appendChild(cell);
    }
  });
}

function showDetail(p) {
  const panel = document.getElementById('detail-panel');
  const c = TYPE_COLORS[p.typeKey];
  const resp = PEOPLE.find(x => x.id === p.resp);
  const collab = p.collab ? PEOPLE.find(x => x.id === p.collab) : null;

  const stageHTML = STAGES.map((s, i) => {
    const cls = i < p.stage ? 'done' : i === p.stage ? 'current' : '';
    return `<div class="stage-dot ${cls}">${i+1}. ${s}</div>`;
  }).join('');

  panel.innerHTML = `
    <div class="detail-top">
      <div>
        <div class="detail-name">${p.ca}</div>
        <div class="detail-meta">${p.client} · ${p.offre || 'N/A'}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:11px;padding:3px 10px;border-radius:20px;background:${c.bg};color:${c.text};font-family:'DM Mono',monospace">${p.type}</span>
        <button class="close-btn" onclick="document.getElementById('detail-panel').classList.remove('open')">×</button>
      </div>
    </div>
    <div class="stage-progress">${stageHTML}</div>
    <div class="detail-grid">
      <div class="detail-item"><label>Responsable</label><span style="color:${resp ? resp.dark : 'inherit'}">${p.respName || '-'}</span></div>
      <div class="detail-item"><label>Collaborateur</label><span style="color:${collab ? collab.dark : 'inherit'}">${p.collabName || '-'}</span></div>
      <div class="detail-item"><label>Ouvert le</label><span>${p.dateOuv || '-'}</span></div>
      <div class="detail-item"><label>Dernière activité</label><span>${p.lastActivity ? new Date(p.lastActivity).toLocaleDateString('fr-CH') : '-'}</span></div>
      ${p.notes ? `<div class="detail-item" style="grid-column:1/-1"><label>Notes IA</label><span style="font-weight:400;font-size:12px;color:var(--text-mid)">${p.notes}</span></div>` : ''}
    </div>
  `;
  panel.classList.add('open');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderPeople(visible) {
  const grid = document.getElementById('people-grid');
  grid.innerHTML = '';

  PEOPLE.forEach(person => {
    const myProjects = visible.filter(p => p.resp === person.id || p.collab === person.id);
    const load = Math.min(100, Math.round((myProjects.length / 6) * 100));

    const card = document.createElement('div');
    card.className = 'person-card';
    card.style.setProperty('--person-color', person.hex);

    const tagsHTML = myProjects.map(p =>
      `<span class="person-project-tag" style="border-color:${TYPE_COLORS[p.typeKey].bar}40;color:${TYPE_COLORS[p.typeKey].text}">${p.ca}</span>`
    ).join('');

    card.innerHTML = `
      <div class="person-card-header">
        <div class="person-card-avatar" style="background:${person.light};color:${person.dark}">${person.initials}</div>
        <div>
          <div class="person-card-name">${person.name}</div>
          <div class="person-card-role">${person.role}</div>
        </div>
        <div style="margin-left:auto;font-size:22px;font-weight:800;color:${person.hex}">${myProjects.length}</div>
      </div>
      <div class="person-load-bar"><div class="person-load-fill" style="width:${load}%;background:${person.hex}"></div></div>
      <div class="person-load-label">${load}% chargé</div>
      <div class="person-projects">${tagsHTML || '<span style="font-size:11px;color:var(--text-dim);font-family:DM Mono,monospace">Aucun projet actif</span>'}</div>
    `;
    grid.appendChild(card);
  });
}

// Auto-refresh toutes les 5 minutes
loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
