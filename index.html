<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Projets — OptimalGo SA</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#1B4F9B; --blue-dark:#0e3270; --blue-light:#e8f0fa; --blue-mid:#4a7bc4;
  --green:#6ec6a0; --green-dark:#3a9e75;
  --bg:#f4f7fc; --white:#ffffff; --border:#dde6f5; --border2:#c8d8f0;
  --text:#1a2a4a; --text-mid:#4a6080; --text-dim:#8a9ab8;
  --pv:#1B4F9B; --pac:#3a9e75; --bat:#c07820; --multi:#7a4a9e;
  --tf:#1B4F9B; --mf:#3a9e75; --su:#c07820; --lc:#7a4a9e;
  --shadow:0 2px 12px rgba(27,79,155,0.08);
  --shadow-md:0 4px 24px rgba(27,79,155,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Raleway',sans-serif;min-height:100vh;}

.topbar{background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 60%,var(--blue-mid) 100%);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:70px;box-shadow:0 2px 20px rgba(27,79,155,0.25);position:sticky;top:0;z-index:100;}
.logo-wrap img{height:36px;filter:brightness(0) invert(1);display:block;}
.topbar-title{color:rgba(255,255,255,0.7);font-size:12px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;}
.topbar-right{display:flex;align-items:center;gap:20px;}
.pulse-wrap{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,0.8);font-size:11px;font-family:'DM Mono',monospace;}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(110,198,160,0.6);animation:pulse 2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(110,198,160,0.6);}70%{box-shadow:0 0 0 8px rgba(110,198,160,0);}100%{box-shadow:0 0 0 0 rgba(110,198,160,0);}}
.refresh-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;padding:6px 14px;border-radius:6px;font-family:'Raleway',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.refresh-btn:hover{background:rgba(255,255,255,0.25);}

.container{max-width:1440px;margin:0 auto;padding:1.5rem 2rem 3rem;}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:1.5rem;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:box-shadow 0.2s,transform 0.2s;}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--card-color,var(--blue));border-radius:0 0 12px 12px;}
.stat-icon{font-size:20px;margin-bottom:8px;}
.stat-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;font-weight:600;}
.stat-val{font-size:36px;font-weight:800;color:var(--card-color,var(--blue));line-height:1.1;margin:2px 0;}
.stat-sub{font-size:11px;color:var(--text-mid);}

.section-header{display:flex;align-items:center;gap:10px;margin:1.5rem 0 0.75rem;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--blue);}
.section-line{flex:1;height:1px;background:var(--border);}

.filters-block{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:1rem;box-shadow:var(--shadow);}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.filter-row+.filter-row{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.filter-label{font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;min-width:60px;font-family:'DM Mono',monospace;}
.filter-btn{background:var(--bg);border:1.5px solid var(--border);color:var(--text-mid);padding:4px 12px;border-radius:20px;font-family:'Raleway',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.filter-btn:hover{border-color:var(--btn-color,var(--blue));color:var(--btn-color,var(--blue));}
.filter-btn.active{background:var(--btn-bg,var(--blue-light));border-color:var(--btn-color,var(--blue));color:var(--btn-color,var(--blue));}

.pipeline-wrap{background:var(--white);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);overflow-x:auto;margin-bottom:1rem;padding:1rem;}
.pipeline-grid{display:grid;grid-template-columns:155px repeat(11,minmax(82px,1fr));gap:4px;min-width:1060px;}
.ph-empty{height:50px;}
.ph-cell{background:linear-gradient(135deg,var(--blue-light),#eef4ff);border:1px solid var(--border);border-radius:8px;padding:6px 4px;text-align:center;font-size:9px;color:var(--blue);font-family:'DM Mono',monospace;font-weight:500;line-height:1.3;display:flex;align-items:center;justify-content:center;height:50px;}
.person-label{padding:8px 6px;display:flex;flex-direction:column;gap:5px;justify-content:flex-start;}
.person-header{display:flex;align-items:center;gap:8px;}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.person-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.2;}
.person-role{font-size:9px;color:var(--text-dim);font-weight:500;}
.load-bar-wrap{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.load-bar{height:100%;border-radius:2px;transition:width 0.6s ease;}
.load-pct{font-size:9px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.stage-cell{min-height:54px;border-radius:8px;background:var(--bg);border:1px solid var(--border);padding:3px;display:flex;flex-direction:column;gap:3px;}
.project-chip{border-radius:5px;padding:4px 6px;font-size:9px;font-weight:700;cursor:pointer;line-height:1.3;transition:all 0.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'DM Mono',monospace;}
.project-chip:hover{transform:scale(1.04);box-shadow:0 2px 8px rgba(0,0,0,0.12);}

.detail-panel{background:var(--white);border:1px solid var(--border2);border-left:4px solid var(--blue);border-radius:12px;padding:1.5rem;margin-bottom:1rem;box-shadow:var(--shadow-md);display:none;animation:slideDown 0.2s ease;}
.detail-panel.open{display:block;}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.detail-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;gap:1rem;}
.detail-name{font-size:22px;font-weight:800;color:var(--blue);}
.detail-meta{font-size:12px;color:var(--text-mid);margin-top:3px;}
.detail-badges{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.badge{font-size:11px;padding:3px 12px;border-radius:20px;font-weight:700;font-family:'DM Mono',monospace;}
.close-btn{background:var(--bg);border:1px solid var(--border);color:var(--text-mid);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.close-btn:hover{border-color:#e55;color:#e55;}
.stage-progress{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:1rem;}
.stage-dot{padding:3px 8px;border-radius:4px;font-size:9px;font-family:'DM Mono',monospace;border:1px solid var(--border);color:var(--text-dim);background:var(--bg);}
.stage-dot.done{background:var(--blue-light);color:var(--blue-mid);border-color:var(--border2);}
.stage-dot.current{background:var(--blue);color:white;border-color:var(--blue);font-weight:700;}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}
.detail-item label{font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;text-transform:uppercase;display:block;margin-bottom:3px;font-weight:600;}
.detail-item span{font-size:13px;font-weight:600;color:var(--text);}

.people-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:1rem;}
.person-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);transition:box-shadow 0.2s,transform 0.2s;border-top:3px solid var(--person-color,var(--blue));}
.person-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.person-card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.person-card-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
.person-card-name{font-size:14px;font-weight:800;color:var(--text);}
.person-card-role{font-size:10px;color:var(--text-dim);font-weight:500;}
.person-count{margin-left:auto;font-size:28px;font-weight:800;}
.person-load-bar{width:100%;height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:4px;}
.person-load-fill{height:100%;border-radius:3px;transition:width 0.6s;}
.person-load-label{font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:10px;}
.person-projects{display:flex;flex-wrap:wrap;gap:4px;}
.person-project-tag{font-size:10px;padding:2px 10px;border-radius:20px;font-family:'DM Mono',monospace;font-weight:600;border:1px solid;cursor:pointer;}

.legend-bar{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:10px 16px;display:flex;gap:20px;flex-wrap:wrap;align-items:center;box-shadow:var(--shadow);}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-mid);font-weight:600;}
.legend-dot{width:10px;height:10px;border-radius:3px;}
.legend-sep{width:1px;height:16px;background:var(--border);}
.legend-note{font-size:10px;color:var(--text-dim);margin-left:auto;font-family:'DM Mono',monospace;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;gap:1rem;color:var(--text-dim);font-size:12px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-msg{background:#fff0f0;border:1px solid #ffcccc;border-radius:8px;padding:1rem 1.5rem;color:#c03030;font-size:12px;}
</style>
</head>

<div id="stats-row" class="stats-row">
  <div class="loading"><div class="spinner"></div></div>
</div>

<div class="filters-block">
  <div class="filter-row">
    <span class="filter-label">Equipe</span>
    <button class="filter-btn active" style="--btn-color:var(--blue);--btn-bg:var(--blue-light)" onclick="filterBy('all',this,'team')">Tous</button>
    <button class="filter-btn" style="--btn-color:var(--tf);--btn-bg:#e8f0fa" onclick="filterBy('tf',this,'team')">Thomas F.</button>
    <button class="filter-btn" style="--btn-color:var(--mf);--btn-bg:#e8f5f0" onclick="filterBy('mf',this,'team')">Marine F.</button>
    <button class="filter-btn" style="--btn-color:var(--su);--btn-bg:#faf0e8" onclick="filterBy('su',this,'team')">Sebastien U.</button>
    <button class="filter-btn" style="--btn-color:var(--lc);--btn-bg:#f5e8f5" onclick="filterBy('lc',this,'team')">Laetitia C.</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">Type</span>
    <button class="filter-btn active" style="--btn-color:var(--blue);--btn-bg:var(--blue-light)" onclick="filterBy('all-type',this,'type')">Tous</button>
    <button class="filter-btn" style="--btn-color:var(--pv);--btn-bg:#e8f0fa" onclick="filterBy('pv',this,'type')">PV</button>
    <button class="filter-btn" style="--btn-color:var(--pac);--btn-bg:#e8f5f0" onclick="filterBy('pac',this,'type')">PAC</button>
    <button class="filter-btn" style="--btn-color:var(--bat);--btn-bg:#faf0e8" onclick="filterBy('bat',this,'type')">Batterie</button>
    <button class="filter-btn" style="--btn-color:var(--multi);--btn-bg:#f5e8f5" onclick="filterBy('multi',this,'type')">Multi</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">Etape</span>
    <button class="filter-btn active" style="--btn-color:var(--blue);--btn-bg:var(--blue-light)" onclick="filterBy('all-stage',this,'stage')">Toutes</button>
    <button class="filter-btn" style="--btn-color:#5a7ab0;--btn-bg:#eef3fa" onclick="filterBy('s0',this,'stage')">1. Prospection</button>
    <button class="filter-btn" style="--btn-color:#5a7ab0;--btn-bg:#eef3fa" onclick="filterBy('s1',this,'stage')">2. Visite tech.</button>
    <button class="filter-btn" style="--btn-color:#5a7ab0;--btn-bg:#eef3fa" onclick="filterBy('s2',this,'stage')">3. Etude</button>
    <button class="filter-btn" style="--btn-color:#d07820;--btn-bg:#faf0e0" onclick="filterBy('s3',this,'stage')">4. Offre envoyee</button>
    <button class="filter-btn" style="--btn-color:#d07820;--btn-bg:#faf0e0" onclick="filterBy('s4',this,'stage')">5. Offre acceptee</button>
    <button class="filter-btn" style="--btn-color:#9a60c0;--btn-bg:#f5eefa" onclick="filterBy('s5',this,'stage')">6. Dem. autor.</button>
    <button class="filter-btn" style="--btn-color:#9a60c0;--btn-bg:#f5eefa" onclick="filterBy('s6',this,'stage')">7. Autor. obtenues</button>
    <button class="filter-btn" style="--btn-color:#2a9e60;--btn-bg:#e8f8f0" onclick="filterBy('s7',this,'stage')">8. Planifie</button>
    <button class="filter-btn" style="--btn-color:#2a9e60;--btn-bg:#e8f8f0" onclick="filterBy('s8',this,'stage')">9. En cours</button>
    <button class="filter-btn" style="--btn-color:#1B4F9B;--btn-bg:#ddeeff" onclick="filterBy('s9',this,'stage')">10. Mise en service</button>
  </div>
</div>

<div class="section-header"><span class="section-title">Vue pipeline par etape</span><div class="section-line"></div></div>
<div class="pipeline-wrap">
  <div id="pipeline-grid" class="pipeline-grid">
    <div class="loading" style="grid-column:1/-1"><div class="spinner"></div><span>Connexion au Google Sheet...</span></div>
  </div>
</div>

<div id="detail-panel" class="detail-panel"></div>

<div class="section-header"><span class="section-title">Charge par collaborateur</span><div class="section-line"></div></div>
<div id="people-grid" class="people-grid"></div>

<div class="legend-bar">
  <div class="legend-item"><div class="legend-dot" style="background:var(--pv)"></div>PV</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--pac)"></div>PAC</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--bat)"></div>Batterie</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--multi)"></div>Multi</div>
  <div class="legend-sep"></div>
  <div class="legend-note">Bordure epaisse = Responsable &middot; Bordure fine = Collaborateur</div>
</div>

</div>

<script>

const STAGES = ['Prospection','Visite tech.','Etude','Offre envoyee','Offre acceptee','Dem. autor.','Autor. obtenues','Planifie','En cours','Mise en service','Cloture'];
const PEOPLE = [
  {id:'tf',name:'Thomas F.',initials:'TF',role:'CEO & Co-fondateur',hex:'#1B4F9B',light:'#deeaf8',dark:'#1B4F9B'},
  {id:'mf',name:'Marine F.',initials:'MF',role:'Tech. PV & Bat.',hex:'#3a9e75',light:'#d8f0e6',dark:'#2a7a58'},
  {id:'su',name:'Sebastien U.',initials:'SU',role:'Ingenieur PV',hex:'#c07820',light:'#faebd0',dark:'#8a5010'},
  {id:'lc',name:'Laetitia C.',initials:'LC',role:'Admin. technico',hex:'#7a4a9e',light:'#eeddf8',dark:'#5a2a7a'},
];
const TC = {
  pv:   {bg:'#deeaf8',text:'#1B4F9B',bar:'#1B4F9B'},
  pac:  {bg:'#d8f0e6',text:'#2a7a58',bar:'#3a9e75'},
  bat:  {bg:'#faebd0',text:'#8a5010',bar:'#c07820'},
  multi:{bg:'#eeddf8',text:'#5a2a7a',bar:'#7a4a9e'},
};
function getType(t){
  if(!t)return'multi';const s=t.toLowerCase();
  if(s.includes('+')||s.includes('multi'))return'multi';
  if(s.includes('pac'))return'pac';if(s.includes('bat'))return'bat';
  if(s.includes('pv'))return'pv';return'multi';
}
function getPerson(n){
  if(!n)return null;const s=n.toLowerCase();
  if(s.includes('thomas')||s.includes('filipetto'))return'tf';
  if(s.includes('marine')||s.includes('fauré')||s.includes('faure'))return'mf';
  if(s.includes('bastien')||s.includes('unal'))return'su';
  if(s.includes('laetitia')||s.includes('chiappini'))return'lc';
  return null;
}
function getStage(s){if(!s)return 0;const m=s.match(/^(\d+)/);return m?parseInt(m[1])-1:0;}

let allP=[],aTeam='all',aType='all-type',aStage='all-stage';

const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-9WPL67Xe6QV7JbzMTXB6_Zn1imLCf478XrvgN6ppkGoRWRfbtouhGTBld4vsXco7XjwdnEaWWmVV/pub?gid=19254900&single=true&output=csv';

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = [];
    let cur = '', inQ = false;
    for (let c of lines[i]) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    result.push(cols);
  }
  return result;
}

async function loadData(){
  document.getElementById('last-update-text').textContent='Actualisation...';
  try{
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    const txt = await res.text();
    const rows = parseCSV(txt);
    allP = rows.map((cols, i) => {
      const g = idx => (cols[idx] || '').trim();
      const ca = g(0);
      if (!ca || ca.toLowerCase().includes('centre')) return null;
      const st = getStage(g(6));
      if (st >= 10) return null;
      return {
        id: 'p'+i, ca, offre: g(1), client: g(2), type: g(3),
        resp: getPerson(g(4)), respName: g(4),
        collab: getPerson(g(5)), collabName: g(5),
        stage: st, etape: g(6), chemin: g(7),
        dateOuv: g(8), lastActivity: g(9), notes: g(10),
        typeKey: getType(g(3))
      };
    }).filter(Boolean);
    document.getElementById('last-update-text').textContent='Mis a jour '+new Date().toLocaleTimeString('fr-CH');
    render();
  } catch(e) {
    document.getElementById('stats-row').innerHTML='<div class="error-msg">Erreur de chargement: '+e.message+'</div>';
    document.getElementById('last-update-text').textContent='Erreur';
  }
}

function filterBy(f,btn,grp){
  if(grp==='team')aTeam=f;
  else if(grp==='type')aType=f;
  else aStage=f;
  const rows=['team','type','stage'];
  const idx=rows.indexOf(grp)+1;
  document.querySelectorAll('.filter-row:nth-child('+idx+') .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function getVisible(){
  return allP.filter(p=>{
    const tOk=aTeam==='all'||p.resp===aTeam||p.collab===aTeam;
    const yOk=aType==='all-type'||p.typeKey===aType;
    const sOk=aStage==='all-stage'||p.stage===parseInt(aStage.replace('s',''));
    return tOk&&yOk&&sOk;
  });
}

function render(){const v=getVisible();renderStats(v);renderPipeline(v);renderPeople(v);}

function renderStats(v){
  const ch=v.filter(p=>p.stage>=7&&p.stage<=8).length;
  const of=v.filter(p=>p.stage===3).length;
  const au=v.filter(p=>p.stage===5||p.stage===6).length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card" style="--card-color:#1B4F9B"><div class="stat-icon">&#128203;</div><div class="stat-label">Projets actifs</div><div class="stat-val">${v.length}</div><div class="stat-sub">en cours</div></div>
    <div class="stat-card" style="--card-color:#2a9e60"><div class="stat-icon">&#127959;</div><div class="stat-label">En chantier</div><div class="stat-val">${ch}</div><div class="stat-sub">planifie ou en cours</div></div>
    <div class="stat-card" style="--card-color:#d07820"><div class="stat-icon">&#128196;</div><div class="stat-label">Offres envoyees</div><div class="stat-val">${of}</div><div class="stat-sub">en attente reponse</div></div>
    <div class="stat-card" style="--card-color:#9a60c0"><div class="stat-icon">&#127963;</div><div class="stat-label">Autorisations</div><div class="stat-val">${au}</div><div class="stat-sub">en cours</div></div>
    <div class="stat-card" style="--card-color:#4a7bc4"><div class="stat-icon">&#128101;</div><div class="stat-label">Collaborateurs</div><div class="stat-val">4</div><div class="stat-sub">actifs</div></div>`;
}

function renderPipeline(v){
  const grid=document.getElementById('pipeline-grid');grid.innerHTML='';
  const e=document.createElement('div');e.className='ph-empty';grid.appendChild(e);
  STAGES.forEach((s,i)=>{const c=document.createElement('div');c.className='ph-cell';c.textContent=(i+1)+'. '+s;grid.appendChild(c);});
  PEOPLE.forEach(person=>{
    const myP=v.filter(p=>p.resp===person.id||p.collab===person.id);
    const load=Math.min(100,Math.round((myP.length/6)*100));
    const lbl=document.createElement('div');lbl.className='person-label';
    lbl.innerHTML=`<div class="person-header"><div class="avatar" style="background:${person.light};color:${person.hex}">${person.initials}</div><div><div class="person-name">${person.name}</div><div class="person-role">${person.role}</div></div></div><div class="load-bar-wrap"><div class="load-bar" style="width:${load}%;background:${person.hex}"></div></div><div class="load-pct">${load}% - ${myP.length} proj.</div>`;
    grid.appendChild(lbl);
    for(let s=0;s<11;s++){
      const cell=document.createElement('div');cell.className='stage-cell';
      myP.filter(p=>p.stage===s).forEach(p=>{
        const c=TC[p.typeKey];const isR=p.resp===person.id;
        const chip=document.createElement('div');chip.className='project-chip';
        chip.title=p.ca+' - '+p.client;chip.style.background=c.bg;chip.style.color=c.text;
        chip.style.border=isR?`2px solid ${c.bar}`:`1px solid ${c.bar}60`;
        chip.textContent=p.ca;chip.onclick=()=>showDetail(p);cell.appendChild(chip);
      });
      grid.appendChild(cell);
    }
  });
}

function showDetail(p){
  const panel=document.getElementById('detail-panel');
  const c=TC[p.typeKey];
  const resp=PEOPLE.find(x=>x.id===p.resp);
  const collab=p.collab?PEOPLE.find(x=>x.id===p.collab):null;
  const sh=STAGES.map((s,i)=>`<div class="stage-dot ${i<p.stage?'done':i===p.stage?'current':''}">${i+1}. ${s}</div>`).join('');
  panel.innerHTML=`<div class="detail-top"><div><div class="detail-name">${p.ca}</div><div class="detail-meta">${p.client}${p.offre?' - Offre '+p.offre:''}</div></div><div class="detail-badges"><span class="badge" style="background:${c.bg};color:${c.text}">${p.type}</span><button class="close-btn" onclick="document.getElementById('detail-panel').classList.remove('open')">x</button></div></div><div class="stage-progress">${sh}</div><div class="detail-grid"><div class="detail-item"><label>Responsable</label><span style="color:${resp?resp.hex:'inherit'}">${p.respName||'-'}</span></div><div class="detail-item"><label>Collaborateur</label><span style="color:${collab?collab.hex:'inherit'}">${p.collabName||'-'}</span></div><div class="detail-item"><label>Ouvert le</label><span>${p.dateOuv||'-'}</span></div><div class="detail-item"><label>Derniere activite</label><span>${p.lastActivity?new Date(p.lastActivity).toLocaleDateString('fr-CH'):'-'}</span></div>${p.notes?`<div class="detail-item" style="grid-column:1/-1"><label>Notes IA</label><span style="font-weight:500;color:var(--text-mid)">${p.notes}</span></div>`:''}</div>`;
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderPeople(v){
  const grid=document.getElementById('people-grid');grid.innerHTML='';
  PEOPLE.forEach(person=>{
    const myP=v.filter(p=>p.resp===person.id||p.collab===person.id);
    const load=Math.min(100,Math.round((myP.length/6)*100));
    const card=document.createElement('div');card.className='person-card';
    card.style.setProperty('--person-color',person.hex);
    const tags=myP.map(p=>`<span class="person-project-tag" style="background:${TC[p.typeKey].bg};color:${TC[p.typeKey].text};border-color:${TC[p.typeKey].bar}50">${p.ca}</span>`).join('');
    card.innerHTML=`<div class="person-card-header"><div class="person-card-avatar" style="background:${person.light};color:${person.hex}">${person.initials}</div><div><div class="person-card-name">${person.name}</div><div class="person-card-role">${person.role}</div></div><div class="person-count" style="color:${person.hex}">${myP.length}</div></div><div class="person-load-bar"><div class="person-load-fill" style="width:${load}%;background:${person.hex}"></div></div><div class="person-load-label">${load}% charge</div><div class="person-projects">${tags||'<span style="font-size:11px;color:var(--text-dim)">Aucun projet actif</span>'}</div>`;
    grid.appendChild(card);
  });
}

loadData();
setInterval(loadData,5*60*1000);
</script>
</body>
</html>
